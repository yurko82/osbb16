<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Реєстрація — МійДім</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Geologica:wght@300;400;500;700;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="auth-page">

<nav class="navbar" id="navbar">
  <div class="nav-container">
    <a href="index.html" class="nav-logo">
      <span class="logo-icon">🏠</span>
      <span class="logo-text">МійДім</span>
    </a>
  </div>
</nav>

<div class="auth-wrap">
  <div class="auth-left">
    <div class="auth-left-content">
      <h2>Ласкаво просимо до<br/><span class="gradient-text">МійДім ОСББ</span></h2>
      <p>Керуйте вашим будинком зручно та прозоро</p>
      <ul class="auth-features">
        <li>✅ Оплата комунальних онлайн</li>
        <li>✅ Заявки на ремонт</li>
        <li>✅ Новини від управителя</li>
        <li>✅ Прозорий бюджет</li>
      </ul>
    </div>
  </div>

  <div class="auth-right">
    <div class="auth-card">
      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="register">Реєстрація</button>
        <button class="auth-tab" data-tab="login">Вхід</button>
      </div>

      <!-- Register Form -->
      <div class="auth-form" id="tab-register">
        <h3>Створити акаунт</h3>
        <div class="form-group">
          <label>Повне ім'я</label>
          <input type="text" placeholder="Іваненко Іван Іванович" id="reg-name"/>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Квартира №</label>
            <input type="number" placeholder="42" id="reg-apt" min="1" max="999"/>
          </div>
          <div class="form-group">
            <label>Поверх</label>
            <input type="number" placeholder="5" id="reg-floor" min="1" max="25"/>
          </div>
        </div>
        <div class="form-group">
          <label>Телефон</label>
          <input type="tel" placeholder="+380 XX XXX XX XX" id="reg-phone"/>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" placeholder="ivan@example.com" id="reg-email"/>
        </div>
        <div class="form-group">
          <label>Пароль</label>
          <div class="input-wrap">
            <input type="password" placeholder="Мінімум 6 символів" id="reg-pass"/>
            <button class="toggle-pass" onclick="togglePass('reg-pass',this)">👁</button>
          </div>
        </div>
        <div class="form-group">
          <label>Роль</label>
          <select id="reg-role">
            <option value="resident">Мешканець</option>
            <option value="admin">Управитель ОСББ</option>
          </select>
        </div>
        <label class="checkbox-wrap">
          <input type="checkbox" id="reg-agree"/>
          <span>Погоджуюсь з умовами використання</span>
        </label>
        <button class="btn-primary btn-full" onclick="registerUser()">Зареєструватись</button>
        <div id="reg-msg" class="form-msg"></div>
      </div>

      <!-- Login Form -->
      <div class="auth-form hidden" id="tab-login">
        <h3>Увійти до системи</h3>
        <div class="form-group">
          <label>Email</label>
          <input type="email" placeholder="ivan@example.com" id="login-email"/>
        </div>
        <div class="form-group">
          <label>Пароль</label>
          <div class="input-wrap">
            <input type="password" placeholder="Ваш пароль" id="login-pass"/>
            <button class="toggle-pass" onclick="togglePass('login-pass',this)">👁</button>
          </div>
        </div>
        <a href="#" class="forgot-link">Забули пароль?</a>
        <button class="btn-primary btn-full" onclick="loginUser()">Увійти</button>
        <div id="login-msg" class="form-msg"></div>
        <div class="auth-divider"><span>або</span></div>
        <p class="auth-switch">Немає акаунту? <a href="#" onclick="switchTab('register')">Зареєструватись</a></p>
      </div>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
