<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Заявки — МійДім</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Geologica:wght@300;400;500;700;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="dashboard-page">

<nav class="navbar" id="navbar">
  <div class="nav-container">
    <a href="index.html" class="nav-logo"><span class="logo-icon">🏠</span><span class="logo-text">МійДім</span></a>
    <button class="burger" id="burger"><span></span><span></span><span></span></button>
    <ul class="nav-links" id="navLinks">
      <li><a href="dashboard.html">Кабінет</a></li>
      <li><a href="news.html">Новини</a></li>
      <li><a href="residents.html">Мешканці</a></li>
      <li><a href="payments.html">Оплата</a></li>
      <li><a href="requests.html" class="active">Заявки</a></li>
      <li><a href="#" onclick="logout()" class="btn-nav btn-logout">Вийти</a></li>
    </ul>
  </div>
</nav>

<div class="dashboard-layout">
  <aside class="sidebar">
    <div class="sidebar-user">
      <div class="user-avatar">І</div>
      <div class="user-info">
        <div class="user-name" id="dash-name">Іваненко І.І.</div>
        <div class="user-apt" id="dash-apt">кв. 42</div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="snav">📊 Огляд</a>
      <a href="payments.html" class="snav">💳 Оплата</a>
      <a href="requests.html" class="snav active">🔧 Заявки</a>
      <a href="news.html" class="snav">📢 Новини</a>
      <a href="residents.html" class="snav">👥 Мешканці</a>
      <a href="#" class="snav snav-logout" onclick="logout()">🚪 Вийти</a>
    </nav>
  </aside>

  <main class="dash-main">
    <div class="dash-greeting">
      <div><h1>🔧 Заявки на ремонт</h1><p>Подайте заявку та відстежуйте її виконання</p></div>
      <button class="btn-primary" onclick="openModal('req-modal')">+ Нова заявка</button>
    </div>

    <!-- Filter -->
    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all">Всі</button>
      <button class="filter-btn" data-filter="new">Нові</button>
      <button class="filter-btn" data-filter="progress">В роботі</button>
      <button class="filter-btn" data-filter="done">Виконані</button>
    </div>

    <!-- Requests list -->
    <div class="req-cards" id="req-cards"></div>
  </main>
</div>

<!-- Modal -->
<div class="modal-overlay hidden" id="req-modal">
  <div class="modal-card">
    <div class="modal-head">
      <h3>Нова заявка</h3>
      <button class="modal-close" onclick="closeModal('req-modal')">✕</button>
    </div>
    <div class="form-group">
      <label>Категорія</label>
      <select id="req-cat">
        <option>Сантехніка</option>
        <option>Електрика</option>
        <option>Ліфт</option>
        <option>Під'їзд / Дах</option>
        <option>Опалення</option>
        <option>Інше</option>
      </select>
    </div>
    <div class="form-group">
      <label>Опис проблеми</label>
      <textarea id="req-desc" rows="4" placeholder="Опишіть проблему детально..."></textarea>
    </div>
    <div class="form-group">
      <label>Пріоритет</label>
      <select id="req-priority">
        <option value="low">Низький</option>
        <option value="mid" selected>Середній</option>
        <option value="high">Терміново</option>
      </select>
    </div>
    <div class="modal-btns">
      <button class="btn-ghost" onclick="closeModal('req-modal')">Скасувати</button>
      <button class="btn-primary" onclick="submitRequest()">Подати заявку</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
